# Weekly competitor-outlier refresh — Mondays 06:30 UTC (~noon IST).
#
# REQUIRED repo secret (GitHub -> Settings -> Secrets and variables -> Actions):
#   YOUTUBE_API_KEY     YouTube Data API v3 key (free tier — docs/outlier_system.md)
# OPTIONAL secret:
#   ANTHROPIC_API_KEY   enables the formula-tagging step; skipped cleanly when absent
#
# Until YOUTUBE_API_KEY is added, every run exits early as a no-op (no failure noise).
# You can also trigger manually: Actions -> weekly-outliers -> Run workflow.

name: weekly-outliers

on:
  schedule:
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml anthropic

      - name: Refresh outliers (last 30 days)
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "::notice::YOUTUBE_API_KEY secret not set — skipping run (see docs/outlier_system.md)"
            echo "SKIP=1" >> "$GITHUB_ENV"
          else
            python scripts/weekly_refresh.py
          fi

      - name: Tag new outliers (optional, needs ANTHROPIC_API_KEY)
        run: |
          if [ -n "$SKIP" ]; then echo "skipped"; exit 0; fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY secret not set — leaving formula_tag blank"
          else
            python scripts/tag_outliers.py --yes
          fi

      - name: Commit updated data
        run: |
          if [ -n "$SKIP" ]; then echo "skipped"; exit 0; fi
          git config user.name "outlier-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/outliers.csv data/.channels_cache.json
          git diff --staged --quiet || {
            git commit -m "chore(data): weekly outlier refresh $(date -u +%F)"
            git push
          }
