# Competitor channels monitored by scripts/fetch_outliers.py — the outlier database.
#
#   name    — display name (used in summaries and outliers.csv)
#   handle  — the channel's @handle; resolved to a channelId via the YouTube API on
#             first run and cached in data/.channels_cache.json (delete the cache if
#             a handle ever changes). You can pin `channelId: UC...` directly to skip
#             resolution.
#   why     — which competitive lane this channel covers (docs/outlier_system.md):
#             format lane (animated explainers we're visually compared against),
#             topic lane (engineering/history/disaster subject overlap),
#             audience lane (same curious Tier-1 viewer, adjacent subjects),
#             packaging lane (title/thumbnail craft worth studying regardless of topic).
#
# Edit freely — add/remove channels; the scripts re-read this file every run.
channels:
  - name: Wendover Productions
    handle: "@Wendoverproductions"
    why: "audience lane — logistics/systems storytelling; the ceiling for the 'How They Moved It' pillar"
  - name: Real Engineering
    handle: "@RealEngineering"
    why: "audience lane — engineering explainers for the exact viewer we want"
  - name: Practical Engineering
    handle: "@PracticalEngineeringChannel"
    why: "topic lane — infrastructure engineering education; strongest trust-brand in the niche"
  - name: Mustard
    handle: "@MustardChannel"
    why: "format lane — the animated engineering-history quality benchmark we're measured against"
  - name: Primal Space
    handle: "@primalspace"
    why: "format lane — animated how-it-works explainers at comparable production scale"
  - name: RealLifeLore
    handle: "@RealLifeLore"
    why: "audience lane — geography/megaproject curiosity; huge Tier-1 reach, raids our topics"
  - name: PolyMatter
    handle: "@PolyMatter"
    why: "audience lane — systems/economics explainers (China focus); clean minimal animation"
  - name: Johnny Harris
    handle: "@johnnyharris"
    why: "packaging lane — the title/thumbnail/storytelling benchmark; study the promise, not the format"
  - name: Fern
    handle: "@fern-tv"
    why: "audience lane — documentary megaproject storytelling; premium pacing and packaging"
  - name: The B1M
    handle: "@TheB1M"
    why: "topic lane — construction megaprojects; closest subject overlap for modern-vs-ancient framings"
  - name: Half as Interesting
    handle: "@halfasinteresting"
    why: "packaging lane — high-volume curiosity-hook titles; a live A/B lab for question formulas"
  - name: Neo
    handle: "@neoexplains"
    why: "audience lane — geography/infrastructure explainers with strong map-driven visuals"
  - name: Curious Droid
    handle: "@CuriousDroid"
    why: "topic lane — engineering history (aerospace/tech); proof the history-of-engineering angle sells"
  - name: Plainly Difficult
    handle: "@PlainlyDifficult"
    why: "topic lane — disaster documentaries; the 'Why It Failed' pillar's direct comp"
  - name: Fall of Civilizations
    handle: "@FallofCivilizations"
    why: "topic lane — long-form ancient-history storytelling; our historical-depth audience overlap"
